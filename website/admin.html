<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>TierLabs — Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="site-shell">
    <div id="topbar"></div>

    <div class="page-wrap">
      <section class="section">
        <h2 class="section-title">Admin Panel</h2>
        <p class="section-subtitle">Manage global website data.</p>

        <div id="authCard" class="card" style="padding:22px;max-width:520px;">
          <div class="admin-form">
            <input id="adminEmail" type="email" placeholder="Admin email">
            <input id="adminPassword" type="password" placeholder="Admin password">
            <button class="primary-btn" id="loginBtn">Login</button>
            <button class="secondary-btn" id="logoutBtn" style="display:none;">Logout</button>
          </div>
        </div>

        <div id="adminPanel" style="display:none;">
          <div class="admin-layout">
            <div class="card admin-card">
              <h3>Add / Update Player</h3>
              <div class="admin-form">
                <input id="playerUsername" placeholder="Username">
                <input id="playerSkin" placeholder="Skin URL (optional)">
                <input id="playerTitle" placeholder="Title (e.g. Combat Master)">
                <input id="playerRegion" placeholder="Region (NA/EU)">
                <select id="playerMode">
                  <option value="sword">SWORD</option>
                  <option value="axe">AXE</option>
                  <option value="crystal">CRYSTAL</option>
                  <option value="nethpot">NETHPOT</option>
                  <option value="pot">POT</option>
                  <option value="uhc">UHC</option>
                  <option value="smp">SMP</option>
                </select>
                <select id="playerTier">
                  <option>HT1</option><option>LT1</option>
                  <option>HT2</option><option>LT2</option>
                  <option>HT3</option><option>LT3</option>
                  <option>HT4</option><option>LT4</option>
                  <option>HT5</option><option>LT5</option>
                </select>
                <button class="primary-btn" id="savePlayerBtn">Save Player</button>
              </div>
            </div>

            <div class="card admin-card">
              <h3>Add Announcement</h3>
              <div class="admin-form">
                <input id="annTitle" placeholder="Announcement title">
                <textarea id="annBody" rows="6" placeholder="Announcement body"></textarea>
                <button class="primary-btn" id="saveAnnouncementBtn">Add Announcement</button>
              </div>
            </div>
          </div>

          <div class="admin-layout" style="margin-top:16px;">
            <div class="card admin-card">
              <h3>Add / Update Tester</h3>
              <div class="admin-form">
                <input id="testerName" placeholder="Tester name">
                <input id="testerAvatar" placeholder="Avatar URL (optional)">
                <input id="testerCompleted" type="number" placeholder="Completed tests">
                <input id="testerSpecialty" placeholder="Specialty">
                <button class="primary-btn" id="saveTesterBtn">Save Tester</button>
              </div>
            </div>
          </div>

          <div class="card admin-card" style="margin-top:16px;">
            <h3>Current Players</h3>
            <div id="playersAdminList" class="table-like"></div>
          </div>

          <div class="card admin-card" style="margin-top:16px;">
            <h3>Current Announcements</h3>
            <div id="announcementsAdminList" class="table-like"></div>
          </div>

          <div class="card admin-card" style="margin-top:16px;">
            <h3>Current Testers</h3>
            <div id="testersAdminList" class="table-like"></div>
          </div>
        </div>
      </section>

      <div class="footer-space"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script src="particles.js"></script>
  <script>
    document.getElementById("topbar").innerHTML = renderTopbar("admin");

    const byId = (id) => document.getElementById(id);

    async function checkSession() {
      const { data } = await supabaseClient.auth.getSession();
      const loggedIn = !!data.session;

      byId("adminPanel").style.display = loggedIn ? "block" : "none";
      byId("logoutBtn").style.display = loggedIn ? "inline-block" : "none";

      if (loggedIn) {
        await drawLists();
      }
    }

    async function drawLists() {
      const playersRes = await supabaseClient.from("players").select("*").order("username");
      const annsRes = await supabaseClient.from("announcements").select("*").order("created_at", { ascending: false });
      const testersRes = await supabaseClient.from("testers").select("*").order("completed", { ascending: false });

      byId("playersAdminList").innerHTML = "";
      byId("announcementsAdminList").innerHTML = "";
      byId("testersAdminList").innerHTML = "";

      (playersRes.data || []).forEach((p) => {
        const row = document.createElement("div");
        row.className = "row-card";
        row.innerHTML = `
          <strong>${p.username}</strong><br>
          <span class="muted">${p.region || "NA"} • ${p.title || "Ranked Player"}</span><br>
          <span class="muted">${JSON.stringify(p.tiers || {})}</span>
          <div class="inline-actions">
            <button class="danger-btn" data-id="${p.id}" data-type="player">Delete</button>
          </div>
        `;
        byId("playersAdminList").appendChild(row);
      });

      (annsRes.data || []).forEach((a) => {
        const row = document.createElement("div");
        row.className = "row-card";
        row.innerHTML = `
          <strong>${a.title}</strong><br>
          <span class="muted">${a.date || ""}</span>
          <p>${a.body}</p>
          <div class="inline-actions">
            <button class="danger-btn" data-id="${a.id}" data-type="announcement">Delete</button>
          </div>
        `;
        byId("announcementsAdminList").appendChild(row);
      });

      (testersRes.data || []).forEach((t) => {
        const row = document.createElement("div");
        row.className = "row-card";
        row.innerHTML = `
          <strong>${t.name}</strong><br>
          <span class="muted">${t.specialty}</span><br>
          <span class="muted">Completed: ${t.completed}</span>
          <div class="inline-actions">
            <button class="danger-btn" data-id="${t.id}" data-type="tester">Delete</button>
          </div>
        `;
        byId("testersAdminList").appendChild(row);
      });
    }

    byId("loginBtn").addEventListener("click", async () => {
      const email = byId("adminEmail").value.trim();
      const password = byId("adminPassword").value;

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        alert(error.message);
        return;
      }

      await checkSession();
      alert("Logged in.");
    });

    byId("logoutBtn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      byId("adminPanel").style.display = "none";
      byId("logoutBtn").style.display = "none";
      alert("Logged out.");
    });

    byId("savePlayerBtn").addEventListener("click", async () => {
      const username = byId("playerUsername").value.trim();
      const skin = byId("playerSkin").value.trim();
      const title = byId("playerTitle").value.trim();
      const region = byId("playerRegion").value.trim().toUpperCase() || "NA";
      const mode = byId("playerMode").value;
      const tier = byId("playerTier").value;

      if (!username) {
        alert("Username required.");
        return;
      }

      const { data: existing } = await supabaseClient
        .from("players")
        .select("*")
        .eq("username", username)
        .maybeSingle();

      if (!existing) {
        const tiers = {};
        tiers[mode] = tier;

        const { error } = await supabaseClient.from("players").insert({
          username,
          skin,
          title: title || "Ranked Player",
          region,
          tiers
        });

        if (error) {
          alert(error.message);
          return;
        }
      } else {
        const newTiers = existing.tiers || {};
        newTiers[mode] = tier;

        const { error } = await supabaseClient
          .from("players")
          .update({
            skin,
            title: title || "Ranked Player",
            region,
            tiers: newTiers
          })
          .eq("id", existing.id);

        if (error) {
          alert(error.message);
          return;
        }
      }

      alert("Player saved.");
      await drawLists();
    });

    byId("saveAnnouncementBtn").addEventListener("click", async () => {
      const title = byId("annTitle").value.trim();
      const body = byId("annBody").value.trim();

      if (!title || !body) {
        alert("Title and body required.");
        return;
      }

      const { error } = await supabaseClient.from("announcements").insert({
        title,
        body,
        date: new Date().toISOString().slice(0, 10)
      });

      if (error) {
        alert(error.message);
        return;
      }

      alert("Announcement added.");
      await drawLists();
    });

    byId("saveTesterBtn").addEventListener("click", async () => {
      const name = byId("testerName").value.trim();
      const avatar = byId("testerAvatar").value.trim();
      const completed = Number(byId("testerCompleted").value || 0);
      const specialty = byId("testerSpecialty").value.trim();

      if (!name) {
        alert("Tester name required.");
        return;
      }

      const { data: existing } = await supabaseClient
        .from("testers")
        .select("*")
        .eq("name", name)
        .maybeSingle();

      if (!existing) {
        const { error } = await supabaseClient.from("testers").insert({
          name,
          avatar,
          completed,
          specialty
        });

        if (error) {
          alert(error.message);
          return;
        }
      } else {
        const { error } = await supabaseClient
          .from("testers")
          .update({
            avatar,
            completed,
            specialty
          })
          .eq("id", existing.id);

        if (error) {
          alert(error.message);
          return;
        }
      }

      alert("Tester saved.");
      await drawLists();
    });

    byId("playersAdminList").addEventListener("click", async (e) => {
      if (!e.target.matches("button[data-type='player']")) return;
      const id = e.target.dataset.id;
      const { error } = await supabaseClient.from("players").delete().eq("id", id);
      if (error) {
        alert(error.message);
        return;
      }
      await drawLists();
    });

    byId("announcementsAdminList").addEventListener("click", async (e) => {
      if (!e.target.matches("button[data-type='announcement']")) return;
      const id = e.target.dataset.id;
      const { error } = await supabaseClient.from("announcements").delete().eq("id", id);
      if (error) {
        alert(error.message);
        return;
      }
      await drawLists();
    });

    byId("testersAdminList").addEventListener("click", async (e) => {
      if (!e.target.matches("button[data-type='tester']")) return;
      const id = e.target.dataset.id;
      const { error } = await supabaseClient.from("testers").delete().eq("id", id);
      if (error) {
        alert(error.message);
        return;
      }
      await drawLists();
    });

    checkSession();
  </script>
</body>
</html>
