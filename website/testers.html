<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>TierLabs — Top Testers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="site-shell">
    <div id="topbar"></div>

    <div class="page-wrap">
      <section class="section">
        <h2 class="section-title">Top Testers</h2>
        <p class="section-subtitle">Recognizing the staff that run the system.</p>

        <div id="testersGrid" class="testers-grid"></div>
      </section>

      <div class="footer-space"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script src="particles.js"></script>
  <script>
    document.getElementById("topbar").innerHTML = renderTopbar("testers");

    async function loadTesters() {
      const { data, error } = await supabaseClient
        .from("testers")
        .select("*")
        .order("completed", { ascending: false });

      const grid = document.getElementById("testersGrid");

      if (error) {
        console.error(error);
        grid.innerHTML = `<div class="card tester-card"><h3>Failed to load testers.</h3></div>`;
        return;
      }

      grid.innerHTML = (data || []).length
        ? data.map((t, i) => `
          <div class="card tester-card">
            <div class="tester-head">
              <div class="tester-avatar">
                ${t.avatar ? `<img src="${t.avatar}" alt="${t.name}" onerror="this.parentNode.innerHTML='${getFallbackAvatarLetter(t.name)}'">` : getFallbackAvatarLetter(t.name)}
              </div>
              <div>
                <h3>#${i + 1} ${t.name}</h3>
                <div class="muted">${t.specialty}</div>
              </div>
            </div>
            <div class="kpi" style="margin-top:16px;">${t.completed}</div>
            <div class="muted">Completed Tests</div>
          </div>
        `).join("")
        : `<div class="card tester-card"><h3>No testers yet.</h3></div>`;
    }

    loadTesters();
  </script>
</body>
</html>
